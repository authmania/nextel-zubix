<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Nextel Connect</title>
<link rel="icon" type="image/png" href="assets/img/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root {
  --teal: #8EE4CF;
  --teal-dark: #5DD3B8;
  --teal-light: #B8F0E3;
  --teal-glow: rgba(142, 228, 203, 0.45);
  --emerald: #0B3D2E;
  --emerald-light: #1A5A45;
  --bg-mint: #E8F5F1;
  --bg-white: #FFFFFF;
  --text-dark: #0B3D2E;
  --text-muted: #6B9E8E;
  --border-soft: rgba(11, 61, 46, 0.08);
  --shadow-soft: 0 4px 24px rgba(11, 61, 46, 0.06);
  --shadow-elegant: 0 20px 60px rgba(11, 61, 46, 0.12);
  --shadow-teal: 0 10px 40px rgba(142, 228, 203, 0.35);
  --gradient-teal: linear-gradient(135deg, #8EE4CF 0%, #5DD3B8 50%, #3BC4A3 100%);
  --gradient-hero: linear-gradient(135deg, #0B3D2E 0%, #1A5A45 55%, #2A7A60 100%);
  --gradient-surface: linear-gradient(180deg, #FFFFFF 0%, #E8F5F1 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Poppins', ui-sans-serif, system-ui, sans-serif;
    background: var(--gradient-surface);
    color: var(--text-dark);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* ── Top Navigation ── */
.top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-soft);
    transition: all 0.4s ease;
}
.top-nav.scrolled {
    background: rgba(255,255,255,0.98);
    box-shadow: var(--shadow-soft);
}
.top-nav .logo-link {
    display: flex; align-items: center; gap: 0.6rem;
    text-decoration: none;
}
.top-nav .logo-link img {
    height: 32px; width: auto;
}
.top-nav .logo-text {
    font-size: 1.1rem; font-weight: 800;
    color: var(--emerald);
    letter-spacing: -0.02em;
}
.top-nav .nav-right {
    display: flex; align-items: center; gap: 0.75rem;
}
.top-nav .nav-link {
    display: none;
    font-size: 0.85rem; font-weight: 600;
    color: var(--emerald);
    opacity: 0.7;
    text-decoration: none;
    padding: 0.5rem 0.75rem;
    border-radius: 50px;
    transition: all 0.3s ease;
}
.top-nav .nav-link:hover {
    opacity: 1;
    background: rgba(11, 61, 46, 0.04);
}
@media (min-width: 640px) {
    .top-nav .nav-link { display: inline-flex; }
}
.top-nav .btn-register {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.6rem 1.25rem;
    background: var(--emerald);
    color: #fff;
    font-size: 0.8rem; font-weight: 700;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: var(--shadow-soft);
    transition: all 0.3s ease;
}
.top-nav .btn-register:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-elegant);
    background: var(--emerald-light);
}

/* ── Hero Background ── */
.page-bg {
    position: fixed; inset: 0; z-index: 0;
    background: var(--gradient-surface);
    overflow: hidden;
}
.page-bg::before {
    content: '';
    position: absolute;
    top: -30%; right: -20%;
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, rgba(142, 228, 203, 0.35) 0%, transparent 65%);
    pointer-events: none;
}
.page-bg::after {
    content: '';
    position: absolute;
    bottom: -20%; left: -15%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(93, 211, 184, 0.2) 0%, transparent 65%);
    pointer-events: none;
}
.page-bg .grid-pattern {
    position: absolute; inset: 0;
    opacity: 0.03;
    background-image:
        linear-gradient(rgba(11, 61, 46, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(11, 61, 46, 0.3) 1px, transparent 1px);
    background-size: 60px 60px;
    -webkit-mask-image: radial-gradient(circle at 50% 30%, black, transparent 70%);
    mask-image: radial-gradient(circle at 50% 30%, black, transparent 70%);
}

/* ── Main Layout ── */
.auth-wrapper {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6rem 1rem 3rem;
}
.auth-container {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
    align-items: center;
}
@media (min-width: 1024px) {
    .auth-container {
        grid-template-columns: 1fr 1.1fr;
        gap: 4rem;
    }
}

/* ── Left Side: Visual ── */
.auth-visual {
    display: none;
    position: relative;
}
@media (min-width: 1024px) {
    .auth-visual { display: block; }
}
.auth-visual .visual-card {
    position: relative;
    border-radius: 2.5rem;
    overflow: hidden;
    aspect-ratio: 1/1;
    box-shadow: var(--shadow-elegant);
    background: var(--bg-white);
}
.auth-visual .visual-card img {
    width: 100%; height: 100%; object-fit: cover;
}
.auth-visual .visual-card::before {
    content: '';
    position: absolute;
    inset: -20px;
    background: var(--gradient-teal);
    border-radius: 3rem;
    filter: blur(40px);
    opacity: 0.25;
    z-index: -1;
}

/* Floating badges */
.float-badge {
    position: absolute;
    background: white;
    border-radius: 1.25rem;
    padding: 0.85rem 1.1rem;
    box-shadow: var(--shadow-elegant);
    border: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 0.75rem;
    animation: float 6s ease-in-out infinite;
}
.float-badge .fb-icon {
    width: 2.25rem; height: 2.25rem;
    border-radius: 0.75rem;
    background: var(--gradient-teal);
    display: grid; place-items: center;
    box-shadow: var(--shadow-teal);
    flex-shrink: 0;
}
.float-badge .fb-icon i {
    font-size: 0.75rem;
    color: var(--emerald);
}
.float-badge .fb-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 500;
}
.float-badge .fb-value {
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--emerald);
}
.float-badge.b1 {
    top: 2.5rem; left: -1.5rem;
    animation-delay: 0s;
}
.float-badge.b2 {
    bottom: 4rem; right: -1rem;
    animation-delay: 1.5s;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* ── Right Side: Form Card ── */
.auth-card {
    background: white;
    border-radius: 2rem;
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow-elegant);
    border: 1px solid var(--border-soft);
    position: relative;
    overflow: hidden;
}
@media (min-width: 640px) {
    .auth-card { padding: 3rem 2.5rem; }
}
.auth-card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(142, 228, 203, 0.25) 0%, transparent 70%);
    pointer-events: none;
}

.auth-brand {
    text-align: center;
    margin-bottom: 2rem;
    position: relative; z-index: 1;
}
.auth-brand .brand-logo {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1.25rem;
}
.auth-brand .brand-logo img {
    height: 36px; width: auto;
}
.auth-brand .brand-logo span {
    font-size: 1.3rem; font-weight: 800;
    color: var(--emerald);
    letter-spacing: -0.02em;
}
.auth-brand h1 {
    font-size: 1.75rem; font-weight: 800;
    color: var(--emerald);
    letter-spacing: -0.02em;
    line-height: 1.2;
}
.auth-brand h1 .teal-text {
    background: var(--gradient-teal);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
.auth-brand p {
    margin-top: 0.5rem;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 400;
}

/* ── Alerts ── */
.alert {
    border-radius: 1rem;
    padding: 1rem 1.25rem;
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 1.25rem;
    display: flex; align-items: flex-start; gap: 0.6rem;
    position: relative; z-index: 1;
}
.alert-success {
    background: rgba(142, 228, 203, 0.15);
    border: 1px solid rgba(142, 228, 203, 0.3);
    color: var(--emerald-light);
}
.alert-error {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: #dc2626;
}
.alert-locked {
    background: rgba(142, 228, 203, 0.12);
    border: 1px solid rgba(142, 228, 203, 0.25);
    color: var(--emerald);
    text-align: center;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
}
.alert-locked .locked-icon {
    font-size: 2rem;
    display: block;
}
.alert i { margin-top: 0.15rem; font-size: 0.9rem; }

/* Progress bar */
.progress-wrap {
    width: 100%;
    height: 6px;
    background: rgba(11, 61, 46, 0.06);
    border-radius: 50px;
    margin-top: 0.75rem;
    overflow: hidden;
}
.progress-fill {
    height: 100%; border-radius: 50px;
    background: var(--gradient-teal);
    transition: width 0.6s ease;
}
.progress-text {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.35rem;
    text-align: center;
}

/* ── Form Fields ── */
.form-group {
    margin-bottom: 1.1rem;
    position: relative; z-index: 1;
}
.form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--emerald);
    margin-bottom: 0.4rem;
    letter-spacing: 0.01em;
}
.input-wrap {
    position: relative;
}
.input-wrap .field-icon {
    position: absolute;
    left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--teal-dark);
    font-size: 0.85rem;
    pointer-events: none;
    z-index: 2;
}
.nextel-input {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.6rem;
    background: var(--bg-mint);
    border: 1.5px solid var(--border-soft);
    border-radius: 1rem;
    font-family: 'Poppins', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-dark);
    outline: none;
    transition: all 0.3s ease;
}
.nextel-input::placeholder {
    color: var(--text-muted);
    font-weight: 400;
}
.nextel-input:focus {
    border-color: var(--teal);
    background: white;
    box-shadow: 0 0 0 4px rgba(142, 228, 203, 0.2);
}
.nextel-input.pw-field {
    padding-right: 2.8rem;
}
.pw-toggle {
    position: absolute;
    right: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    z-index: 2;
    transition: color 0.2s;
    background: none; border: none;
}
.pw-toggle:hover { color: var(--teal-dark); }

/* ── Remember & Forgot ── */
.remember-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    position: relative; z-index: 1;
}
.remember-check {
    display: flex; align-items: center; gap: 0.5rem;
    cursor: pointer;
}
.remember-check input {
    width: 1.1rem; height: 1.1rem;
    border-radius: 0.3rem;
    border: 1.5px solid var(--border-soft);
    accent-color: var(--teal);
    cursor: pointer;
}
.remember-check label {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
    cursor: pointer;
}
.forgot-link {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--emerald);
    text-decoration: none;
    transition: color 0.2s;
}
.forgot-link:hover {
    color: var(--teal-dark);
    text-decoration: underline;
}

/* ── Submit Button ── */
.btn-submit {
    width: 100%;
    padding: 0.95rem;
    background: var(--emerald);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    border-radius: 1rem;
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    position: relative; z-index: 1;
    letter-spacing: 0.01em;
}
.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-teal);
    background: var(--emerald-light);
}
.btn-submit:active {
    transform: translateY(0);
}
.btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
}

/* ── Divider ── */
.divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    position: relative; z-index: 1;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-soft), transparent);
}
.divider span {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
}

/* ── Register Link ── */
.register-prompt {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 0.88rem;
    color: var(--text-muted);
    font-weight: 500;
    position: relative; z-index: 1;
}
.register-prompt a {
    color: var(--emerald);
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
}
.register-prompt a:hover {
    color: var(--teal-dark);
    text-decoration: underline;
}

/* ── Footer note ── */
.footer-note {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.7rem;
    color: var(--text-muted);
    position: relative; z-index: 1;
}
.footer-note a {
    color: var(--emerald);
    font-weight: 600;
    text-decoration: none;
}
.footer-note a:hover { text-decoration: underline; }

/* ── Reveal Animation ── */
.reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s cubic-bezier(.22,.61,.36,1), transform 0.7s cubic-bezier(.22,.61,.36,1);
}
.reveal.is-shown {
    opacity: 1;
    transform: translateY(0);
}
.reveal-d1 { transition-delay: 0.08s; }
.reveal-d2 { transition-delay: 0.16s; }
.reveal-d3 { transition-delay: 0.24s; }
.reveal-d4 { transition-delay: 0.32s; }
.reveal-d5 { transition-delay: 0.40s; }
</style>
</head>
<body>

<!-- Background -->
<div class="page-bg"><div class="grid-pattern"></div></div>

<!-- Top Navigation -->
<nav class="top-nav" id="topNav">
    <a href="index.html" class="logo-link">
        <img src="assets/img/nextel-logo.png" alt="Nextel Connect">
        <span class="logo-text">Nextel</span>
    </a>
    <div class="nav-right">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#services" class="nav-link">Services</a>
        <a href="register.html" class="btn-register">
            <i class="fas fa-user-plus" style="font-size:0.7rem;"></i> Register
        </a>
    </div>
</nav>

<!-- Main Content -->
<div class="auth-wrapper">
    <div class="auth-container">

        <!-- Left: Visual -->
        <div class="auth-visual reveal">
            <div class="visual-card">
                <img src="assets/img/nextel-income-flyer.jpg" alt="Nextel Connect - Telecom companies make money per second">
            </div>
            <div class="float-badge b1">
                <div class="fb-icon"><i class="fas fa-signal"></i></div>
                <div>
                    <div class="fb-label">Network speed</div>
                    <div class="fb-value">5G · 1.2 Gbps</div>
                </div>
            </div>
            <div class="float-badge b2">
                <div class="fb-icon"><i class="fas fa-shield-halved"></i></div>
                <div>
                    <div class="fb-label">Active users</div>
                    <div class="fb-value">2.4M+</div>
                </div>
            </div>
        </div>

        <!-- Right: Form -->
        <div class="auth-card">
            <div class="auth-brand reveal">
                <div class="brand-logo">
                    <img src="assets/img/nextel-logo.png" alt="Nextel Connect">
                    <span>Nextel</span>
                </div>
                <h1>Welcome Back <span class="teal-text">✦</span></h1>
                <p>Sign in to continue your Nextel journey</p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>
            
            <form id="loginForm" class="reveal reveal-d2" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email or Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user field-icon"></i>
                        <input type="text" id="loginInput" class="nextel-input"
                               placeholder="Enter email or username"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" id="password" class="nextel-input pw-field"
                               placeholder="••••••••" required>
                        <button type="button" class="pw-toggle" id="togglePw">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-row">
                    <label class="remember-check">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">
                    <i class="fas fa-right-to-bracket"></i> Sign In to Nextel
                </button>
            </form>

            <div class="divider reveal reveal-d3">
                <span>or</span>
            </div>

            <p class="register-prompt reveal reveal-d4">
                New here? <a href="register.html">Create your Nextel account →</a>
            </p>

            <p class="footer-note reveal reveal-d5">
                By signing in, you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a>.
            </p>
        </div>

    </div>
</div>

<script>
// ── Toggle Password Visibility ──
document.getElementById('togglePw').addEventListener('click', function () {
    const inp = document.getElementById('password');
    const icon = this.querySelector('i');
    const hidden = inp.type === 'password';
    inp.type = hidden ? 'text' : 'password';
    icon.className = hidden ? 'fas fa-eye-slash' : 'fas fa-eye';
});

// ── Show Alert ──
function showAlert(message, type = 'error') {
    const container = document.getElementById('alertContainer');
    const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
    container.innerHTML = `
        <div class="alert alert-${type}">
            <i class="fas ${icon}"></i>
            <span>${message}</span>
        </div>
    `;
    // Auto-hide after 5 seconds
    setTimeout(() => { container.innerHTML = ''; }, 5000);
}

// ── Get Users from localStorage ──
function getUsers() {
    try {
        return JSON.parse(localStorage.getItem('nextel_users')) || [];
    } catch { return []; }
}

// ── Handle Login ──
function handleLogin(event) {
    event.preventDefault();
    
    const loginInput = document.getElementById('loginInput').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const loginBtn = document.getElementById('loginBtn');
    
    // ── Validate ──
    if (!loginInput) {
        showAlert('Please enter your username or email.', 'error');
        return;
    }
    
    if (!password) {
        showAlert('Please enter your password.', 'error');
        return;
    }

    // ── Disable button to prevent double submission ──
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

    // ── Find user ──
    const users = getUsers();
    const user = users.find(u => 
        u.username.toLowerCase() === loginInput.toLowerCase() || 
        u.email.toLowerCase() === loginInput.toLowerCase()
    );

    // ── Check if user exists ──
    if (!user) {
        showAlert('No account found with that username or email.', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In to Nextel';
        return;
    }

    // ── Check password ──
    if (user.password !== password) {
        showAlert('Incorrect password. Please try again.', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In to Nextel';
        return;
    }

    // ── Success: Save session ──
    const sessionData = {
        userId: user.id,
        username: user.username,
        fullname: user.fullname,
        email: user.email
    };
    localStorage.setItem('nextel_session', JSON.stringify(sessionData));

    // ── Remember me: save login info ──
    if (remember) {
        localStorage.setItem('nextel_remember', JSON.stringify({
            login: loginInput,
            remember: true
        }));
    } else {
        localStorage.removeItem('nextel_remember');
    }

    // ── Show success message ──
    Swal.fire({
        icon: 'success',
        title: 'Welcome back! 👋',
        html: `<div style="color:#6B9E8E;font-size:.95rem;line-height:1.7;">
                 Signed in as <strong style="color:#0B3D2E;">${user.fullname || user.username}</strong>
               </div>`,
        background: '#fff',
        color: '#0B3D2E',
        confirmButtonColor: '#3BC4A3',
        confirmButtonText: 'Go to Dashboard',
        timer: 3000,
        timerProgressBar: true
    }).then(() => {
        window.location.href = 'dashboard.html';
    });

    // Reset button (will be redirected anyway)
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In to Nextel';
}

// ── Check if already logged in ──
function checkSession() {
    const session = localStorage.getItem('nextel_session');
    if (session) {
        try {
            const sess = JSON.parse(session);
            const users = getUsers();
            const user = users.find(u => u.id === sess.userId);
            if (user) {
                // Already logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
                return true;
            }
        } catch { /* ignore */ }
    }
    return false;
}

// ── Restore "Remember Me" login ──
function restoreRememberedLogin() {
    try {
        const data = JSON.parse(localStorage.getItem('nextel_remember'));
        if (data && data.login) {
            document.getElementById('loginInput').value = data.login;
            document.getElementById('remember').checked = true;
        }
    } catch { /* ignore */ }
}

// ── Reveal Animations ──
document.addEventListener('DOMContentLoaded', function() {
    // Check if already logged in
    if (checkSession()) return;
    
    // Restore remembered login
    restoreRememberedLogin();
    
    // Animate reveals
    const reveals = document.querySelectorAll('.reveal');
    reveals.forEach((el, i) => {
        setTimeout(() => el.classList.add('is-shown'), 100 + i * 80);
    });
});

window.addEventListener('scroll', function() {
    document.getElementById('topNav').classList.toggle('scrolled', window.scrollY > 10);
});
</script>
</body>
